<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集团招聘周期达成率标准化看板 v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --nav-w: 220px; --nav-collapsed: 0px;
  --primary: #1a3a5c; --primary-light: #2c5282; --primary-bg: #eef2f7;
  --success: #0d9488; --success-light: #e6f7f5; --success-bg: #f0fdf9;
  --warning: #d97706; --warning-light: #fef3c7; --warning-bg: #fffbeb;
  --danger: #dc2626; --danger-light: #fef2f2; --danger-bg: #fef2f2;
  --info: #6366f1; --info-light: #e0e7ff;
  --bg: #f1f5f9; --card: #ffffff; --card-hover: #f8fafc;
  --text: #1e293b; --text2: #64748b; --text3: #94a3b8;
  --border: #e2e8f0; --border-light: #f1f5f9;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06); --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
  --transition: 0.2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
#app{display:flex;height:100vh;overflow:hidden}

/* ========== SIDEBAR ========== */
#sidebar{width:var(--nav-w);min-width:var(--nav-w);background:linear-gradient(180deg,var(--primary) 0%,#0f2440 100%);color:#fff;display:flex;flex-direction:column;transition:width var(--transition),min-width var(--transition);overflow:hidden;z-index:100}
#sidebar.collapsed{width:0;min-width:0}
.sidebar-header{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap}
.sidebar-header h2{font-size:16px;font-weight:700;letter-spacing:-.3px}
.sidebar-header .ver{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:all var(--transition);white-space:nowrap;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#60a5fa}
.nav-item .icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.nav-item .badge-nav{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:auto}
.badge-nav.red{background:#dc2626;color:#fff}

/* ========== MAIN ========== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Toolbar */
#toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;z-index:10;box-shadow:var(--shadow)}
#toggle-nav{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer;font-size:16px;color:var(--text2);transition:all var(--transition);flex-shrink:0}
#toggle-nav:hover{background:var(--border-light);color:var(--text)}
#upload-area{position:relative}
#upload-btn{background:var(--primary);color:#fff;border:none;padding:7px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:600;transition:all var(--transition);white-space:nowrap}
#upload-btn:hover{background:var(--primary-light)}
#file-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tool-filter{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.tool-filter select,.tool-filter input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--card);color:var(--text);min-width:100px}
.tool-filter select:focus{outline:none;border-color:var(--primary)}
#export-btn{background:var(--success);color:#fff;border:none;padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-weight:600;transition:all var(--transition);margin-left:auto}
#export-btn:hover{opacity:.9}
#upload-status{font-size:11px;color:var(--success);white-space:nowrap;font-weight:500}

/* Scroll */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;scroll-behavior:smooth}
#content::-webkit-scrollbar{width:8px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Sections */
.section{margin-bottom:24px}
.section-title{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.section-title .s-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:var(--radius-sm);background:var(--primary);color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.section-desc{font-size:12px;color:var(--text2);margin-bottom:16px;padding-left:34px}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.kpi-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .15s;cursor:pointer;position:relative}
.kpi-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.kpi-card .klabel{font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.kpi-card .kvalue{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.kpi-card .kvalue.green{color:var(--success)}.kpi-card .kvalue.red{color:var(--danger)}.kpi-card .kvalue.amber{color:var(--warning)}.kpi-card .kvalue.blue{color:var(--primary)}
.kpi-card .kmeta{font-size:11px;color:var(--text2);margin-top:4px}
.kpi-card .kmom{font-size:12px;font-weight:600}.kmom.up{color:var(--success)}.kmom.down{color:var(--danger)}
.kpi-card .kclick{position:absolute;bottom:8px;right:12px;font-size:10px;color:var(--text3)}

/* Charts */
.chart-wrap{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.chart-wrap .ctitle{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.chart-inner{position:relative;height:260px}
.chart-inner.tall{height:320px}.chart-inner.short{height:200px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:14px}

/* Tables */
.table-wrap{overflow-x:auto;max-height:360px;overflow-y:auto}
.table-wrap.tall{max-height:500px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:10px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:8px 10px;border-bottom:1px solid var(--border-light);color:var(--text)}
tr:hover{background:#f8fafc}
tr.row-red{background:var(--danger-bg)!important}
tr.row-yellow{background:var(--warning-bg)!important}
tr.row-green{background:var(--success-bg)!important}

/* Tags */
.tag{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.tag-red{background:#fef2f2;color:#dc2626}.tag-yellow{background:#fef3c7;color:#d97706}.tag-green{background:#e6f7f5;color:#0d9488}.tag-blue{background:#eff6ff;color:#2563eb}

/* Alert */
.alert{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:var(--radius);margin-bottom:14px;font-size:13px;line-height:1.6}
.alert-danger{background:var(--danger-bg);border-left:4px solid var(--danger)}
.alert-warning{background:var(--warning-bg);border-left:4px solid var(--warning)}
.alert-info{background:#eff6ff;border-left:4px solid var(--primary)}
.alert .alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* Recommendations */
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.rec-card{border-radius:var(--radius);padding:18px;border:1px solid var(--border)}
.rec-card h4{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rec-card ul{list-style:none;padding:0}
.rec-card li{font-size:12px;color:var(--text2);padding:4px 0 4px 16px;position:relative}
.rec-card li::before{content:'';position:absolute;left:0;top:10px;width:5px;height:5px;border-radius:50%}
.rec-urgent{background:var(--danger-bg);border-color:#fecaca}.rec-urgent h4{color:var(--danger)}.rec-urgent li::before{background:var(--danger)}
.rec-medium{background:var(--warning-bg);border-color:#fde68a}.rec-medium h4{color:var(--warning)}.rec-medium li::before{background:var(--warning)}
.rec-long{background:#eff6ff;border-color:#bfdbfe}.rec-long h4{color:var(--primary)}.rec-long li::before{background:var(--primary)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);width:90%;max-width:1000px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--border-light)}
.modal-body{padding:16px 20px}

/* Heatmap */
.heatmap-cell{padding:4px 8px;text-align:center;font-size:12px;font-weight:600;border-radius:4px;min-width:60px}
.heatmap-hi{background:#dc2626;color:#fff}
.heatmap-md{background:#f59e0b;color:#fff}
.heatmap-lo{background:#0d9488;color:#fff}
.heatmap-na{background:#f1f5f9;color:#94a3b8}

/* Responsive */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-2-1,.grid-1-2{grid-template-columns:1fr}.rec-grid{grid-template-columns:1fr}}

/* Upload overlay */
#upload-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,36,64,.92);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column}
#upload-overlay.hidden{display:none}
.upload-box{border:2px dashed rgba(255,255,255,.3);border-radius:16px;padding:48px 64px;text-align:center;color:#fff;cursor:pointer;transition:all .2s}
.upload-box:hover{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.05)}
.upload-box .upload-icon{font-size:48px;margin-bottom:16px;display:block}
.upload-box h2{font-size:20px;margin-bottom:6px}
.upload-box p{font-size:13px;color:rgba(255,255,255,.5)}

/* Skeleton loading */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:400px 100%;animation:shimmer 1.5s infinite;border-radius:4px}

/* Footer */
.footer{padding:12px 20px;text-align:center;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px}
</style>
</head>

  <!-- Content -->
  <div id="content"></div>
</div>

</div>

<!-- Upload Overlay -->
<div id="upload-overlay">

</div>

<div id="modal-container"></div>

// ============================================================
// DATA ENGINE
// ============================================================
function parseUploadedExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type:'array' });
        // Find the main data sheet (largest sheet with detailed data)
        let mainSheet = null, maxRows = 0;
        wb.SheetNames.forEach(name => {
          const ws = wb.Sheets[name];
          const range = XLSX.utils.decode_range(ws['!ref']);
          if (range.e.r > maxRows && range.e.r > 100) {
            maxRows = range.e.r;
            mainSheet = name;
          }
        });
        
        if (!mainSheet) { reject(new Error('未找到有效数据表')); return; }
        
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[mainSheet], { defval:'' });
        if (raw.length < 10) { reject(new Error('数据行数不足')); return; }
        
        // Field mapping
        const mapped = raw.map(row => ({
          seq:        row['序号'] || row['seq'] || '',
          reqNo:      row['需求编号'] || row['requirement_no'] || '',
          position:   row['职位名称'] || row['position_name'] || '',
          bu:         row['BU'] || '',
          category:   row['岗位类别'] || row['job_category'] || '',
          org2:       row['二级组织'] || row['org_l2'] || '',
          org3:       row['三级组织'] || row['org_l3'] || '',
          org4:       row['四级组织'] || row['org_l4'] || '',
          grade:      row['需求职级'] || row['grade'] || '',
          costType:   row['成本分类'] || row['cost_type'] || '',
          isNew:      row['新增/替补'] || row['is_new'] || '',
          recruiter:  row['招聘负责人'] || row['recruiter'] || '',
          recruiterId:row['招聘负责人工号'] || row['recruiter_id'] || '',
          status:     row['岗位状态'] || row['status'] || '',
          region:     row['区域(必填)'] || row['region'] || '',
          base:       row['base地'] || row['base_location'] || '',
          startDate:  parseDate(row['招聘周期起始时间'] || row['start_date']),
          onboardDate:parseDate(row['入职日期'] || row['onboard_date']),
          candidate:  row['入职候选人姓名'] || row['candidate'] || '',
          onboardGrade:row['入职职级'] || row['onboard_grade'] || '',
          stdCycle:   parseInt(row['岗位标准招聘周期'] || row['standard_cycle'] || 0),
          actualCycle:parseInt(row['已入职人员实际到岗周期'] || row['actual_cycle'] || 0),
          cycleDiff:  parseInt(row['已入职的周期差异+为超出'] || row['cycle_diff'] || 0) || 
                       parseInt(row['已入职的周期差异'] || 0),
          isOnTime:   (row['是否周期内达成'] || row['is_on_time'] || '').includes('周期内达成') && 
                       !(row['是否周期内达成']||'').includes('超周期'),
          channel:    row['招聘渠道'] || row['channel'] || '',
          onboardId:  row['入职候选人工号'] || row['onboard_id'] || '',
        }));
        
        resolve(mapped);
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  // Handle Excel serial number
  if (typeof val === 'number') {
    return new Date((val - 25569) * 86400 * 1000);
  }
  const s = String(val).trim();
  if (!s) return null;
  // Try various date formats
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d;
  // Try YYYY-MM-DD HH:MM:SS
  const m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}

function computeAllMetrics(data) {
  // Apply filters
  let d = [...data];
  if (STATE.filters.period !== 'all') {
    const now = new Date();
    let cutoff;
    if (STATE.filters.period === 'week') { cutoff = new Date(now - 7*86400000); }
    else { cutoff = new Date(now.getFullYear(), now.getMonth(), 1); }
    d = d.filter(r => r.startDate && r.startDate >= cutoff);
  }
  if (STATE.filters.recruiter !== 'all') d = d.filter(r => r.recruiter === STATE.filters.recruiter);
  if (STATE.filters.region !== 'all') d = d.filter(r => r.org2 === STATE.filters.region || r.org3 === STATE.filters.region);
  if (STATE.filters.category !== 'all') d = d.filter(r => r.category === STATE.filters.category || r.costType === STATE.filters.category);

  const effective = d.filter(r => ['招聘中','已发offer待入职','已入职'].some(s => r.status.includes(s)));
  const onboarded = d.filter(r => r.status.includes('已入职') && !r.status.includes('待入职'));
  const onTime = onboarded.filter(r => r.isOnTime);
  const overdue = onboarded.filter(r => !r.isOnTime);
  const recruiting = d.filter(r => r.status.includes('招聘中'));
  const offerPending = d.filter(r => r.status.includes('已发offer') && r.status.includes('待入职'));
  const offerOverdue = offerPending.filter(r => r.cycleDiff > 0 || r.actualCycle > r.stdCycle);
  
  // Metrics
  const totalEffective = effective.length;
  const totalOnboarded = onboarded.length;
  const totalOnTime = onTime.length;
  const totalOverdue = overdue.length;
  const achieveRate = totalEffective > 0 ? totalOnTime / totalEffective : 0;
  const completeRate = totalEffective > 0 ? totalOnboarded / totalEffective : 0;
  const overdueRate = totalOnboarded > 0 ? totalOverdue / totalOnboarded : 0;
  
  // By recruiter
  const recruiterMap = {};
  d.forEach(r => {
    const name = r.recruiter || '未知';
    if (!recruiterMap[name]) recruiterMap[name] = { name, total:0, onboarded:0, onTime:0, overdue:0, offerPending:0 };
    recruiterMap[name].total++;
    if (r.status.includes('已入职') && !r.status.includes('待入职')) { recruiterMap[name].onboarded++; if (r.isOnTime) recruiterMap[name].onTime++; else recruiterMap[name].overdue++; }
    if (r.status.includes('已发offer') && r.status.includes('待入职')) recruiterMap[name].offerPending++;
  });
  const recruiters = Object.values(recruiterMap).filter(r => r.total > 0).sort((a,b) => b.overdue - a.overdue);
  
  // By org3
  const orgMap = {};
  d.forEach(r => {
    const org = r.org3 || r.org2 || '未知';
    if (!orgMap[org]) orgMap[org] = { org, total:0, onboarded:0, onTime:0, overdue:0, achieveRate:0 };
    orgMap[org].total++;
    if (r.status.includes('已入职') && !r.status.includes('待入职')) { orgMap[org].onboarded++; if (r.isOnTime) orgMap[org].onTime++; else orgMap[org].overdue++; }
  });
  Object.values(orgMap).forEach(o => { o.achieveRate = o.total > 0 ? o.onTime / o.total : 0; });
  const orgs = Object.values(orgMap).sort((a,b) => b.total - a.total);
  
  // By category (A/B/C)
  const catMap = {};
  d.forEach(r => {
    const cat = r.category || '未知';
    if (!catMap[cat]) catMap[cat] = { cat, total:0, onboarded:0, onTime:0, overdue:0 };
    catMap[cat].total++;
    if (r.status.includes('已入职') && !r.status.includes('待入职')) { catMap[cat].onboarded++; if (r.isOnTime) catMap[cat].onTime++; else catMap[cat].overdue++; }
  });
  const cats = Object.values(catMap);
  
  // By channel
  const chMap = {};
  d.forEach(r => {
    const ch = r.channel || '未知';
    if (!chMap[ch]) chMap[ch] = { ch, total:0, onboarded:0 };
    chMap[ch].total++;
    if (r.status.includes('已入职') && !r.status.includes('待入职')) chMap[ch].onboarded++;
  });
  const channels = Object.values(chMap).sort((a,b) => b.total - a.total);
  
  // By domestic/overseas
  const domestic = d.filter(r => r.region === '国内');
  const overseas = d.filter(r => r.region === '海外');
  const domOnboarded = domestic.filter(r => r.status.includes('已入职') && !r.status.includes('待入职'));
  const ovsOnboarded = overseas.filter(r => r.status.includes('已入职') && !r.status.includes('待入职'));
  const domRate = domestic.length > 0 ? domOnboarded.filter(r => r.isOnTime).length / domestic.length : 0;
  const ovsRate = overseas.length > 0 ? ovsOnboarded.filter(r => r.isOnTime).length / overseas.length : 0;
  
  // Warning list (recruiting positions > 80% of standard cycle)
  const warnings = recruiting.filter(r => {
    if (!r.startDate || !r.stdCycle || r.stdCycle <= 0) return false;
    const days = Math.floor((new Date() - r.startDate) / 86400000);
    return days >= r.stdCycle * 0.8;
  }).map(r => ({...r, daysSinceStart: Math.floor((new Date() - r.startDate) / 86400000) })).sort((a,b) => b.daysSinceStart - a.daysSinceStart);
  
  // Overdue detail
  const overdueDetail = [...overdue, ...offerOverdue].sort((a,b) => (b.cycleDiff||b.actualCycle||0) - (a.cycleDiff||a.actualCycle||0));
  
  // Monthly trend (simulated — can be enhanced with actual monthly data)
  // We'll create from the actual data by bucketing by month
  const monthMap = {};
  d.forEach(r => {
    if (!r.startDate) return;
    const m = `${r.startDate.getFullYear()}-${String(r.startDate.getMonth()+1).padStart(2,'0')}`;
    if (!monthMap[m]) monthMap[m] = { month:m, total:0, onboarded:0, onTime:0, overdue:0 };
    monthMap[m].total++;
    if (r.status.includes('已入职') && !r.status.includes('待入职')) { monthMap[m].onboarded++; if (r.isOnTime) monthMap[m].onTime++; else monthMap[m].overdue++; }
  });
  const monthlyTrend = Object.values(monthMap).sort((a,b) => a.month.localeCompare(b.month));
  
  return {
    totalEffective, totalOnboarded, totalOnTime, totalOverdue,
    achieveRate, completeRate, overdueRate,
    recruiters, orgs, cats, channels,
    domestic: { total:domestic.length, onboarded:domOnboarded.length, onTime:domOnboarded.filter(r=>r.isOnTime).length, rate:domRate },
    overseas: { total:overseas.length, onboarded:ovsOnboarded.length, onTime:ovsOnboarded.filter(r=>r.isOnTime).length, rate:ovsRate },
    warnings, overdueDetail, monthlyTrend,
    recruiting: recruiting.length, offerPending: offerPending.length, offerOverdue: offerOverdue.length,
    avgCycle: onboarded.length > 0 ? Math.round(onboarded.reduce((s,r)=>s+(r.actualCycle||0),0) / onboarded.length) : 0,
  };
}

function destroyCharts() {
  Object.values(STATE.chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  STATE.chartInstances = {};
}

function makeChart(canvasId, config) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return null;
  const ctx = canvas.getContext('2d');
  const chart = new Chart(ctx, config);
  STATE.chartInstances[canvasId] = chart;
  return chart;
}

  orgs.forEach(o => {
    const rate = o.achieveRate;
    const cls = rate>=0.9?'heatmap-lo':rate>=0.8?'heatmap-md':'heatmap-hi';
    const level = rate>=0.9?'优秀':rate>=0.8?'达标':'关注';
    heatmapHtml += `<tr><td>${o.org}</td><td>${o.total}</td><td>${o.onboarded}</td><td>${o.onTime}</td><td>${o.overdue>0?`<span class="tag tag-red">${o.overdue}</span>`:'0'}</td><td><span class="heatmap-cell ${cls}">${(rate*100).toFixed(1)}%</span></td><td><span class="tag ${rate>=0.9?'tag-green':rate>=0.8?'tag-yellow':'tag-red'}">${level}</span></td></tr>`;
  });
  heatmapHtml += '</tbody></table>';
  
  el.innerHTML = `
    <div class="grid-2">
      <div class="chart-wrap"><div class="ctitle">各三级组织达成率排名</div><div class="chart-inner tall"><canvas id="chart-org-rank"></canvas></div></div>
      <div class="chart-wrap"><div class="ctitle">区域达成率热力矩阵</div><div class="table-wrap tall">${heatmapHtml}</div></div>
    </div>
  `;
  
  makeChart('chart-org-rank', {
    type:'bar', indexAxis:'y',
    data:{ labels:orgs.map(o=>o.org), datasets:[{ label:'周期内达成率', data:orgs.map(o=>+(o.achieveRate*100).toFixed(1)), backgroundColor:orgs.map(o=>o.achieveRate>=0.9?'#0d9488':o.achieveRate>=0.8?'#d97706':'#dc2626'), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{ min:60, max:100, ticks:{callback:v=>v+'%'} } }, plugins:{ legend:{display:false} } }
  });
}

// ---- SECTION 7: WARNING ----
function renderWarning(m) {
  const el = document.getElementById('content-warning');
  const warns = m.warnings;
  
  let tbody = warns.length === 0 ? '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">✅ 当前无超期预警岗位</td></tr>' :
    warns.map(r => `<tr class="${r.daysSinceStart>=r.stdCycle?'row-red':'row-yellow'}">
      <td>${r.reqNo||'-'}</td><td>${r.position||'-'}</td><td>${r.recruiter||'-'}</td>
      <td>${r.stdCycle||'-'}天</td><td>${r.daysSinceStart}天</td>
      <td>${r.daysSinceStart>=r.stdCycle?`<span class="tag tag-red">已超期</span>`:`<span class="tag tag-yellow">达${(r.daysSinceStart/r.stdCycle*100).toFixed(0)}%</span>`}</td>
    </tr>`).join('');
  
  el.innerHTML = `
    ${warns.length > 0 ? `<div class="alert alert-warning"><span class="alert-icon">⚠️</span><div><strong>超期预警：</strong>共有 <strong>${warns.length}</strong> 个在招岗位已达到或超过标准周期的80%，建议重点关注并提前干预。</div></div>` : ''}
    <div class="grid-2">
      <div class="chart-wrap"><div class="ctitle">在招岗位招聘天数分布</div><div class="chart-inner"><canvas id="chart-days-dist"></canvas></div></div>
      <div class="chart-wrap"><div class="ctitle">超期预警清单</div><div class="table-wrap tall"><table><thead><tr><th>需求编号</th><th>岗位</th><th>负责人</th><th>标准周期</th><th>已招天数</th><th>状态</th></tr></thead><tbody>${tbody}</tbody></table></div></div>
    </div>
  `;
  
  // Days distribution of recruiting positions
  const recruitingList = STATE.rawData.filter(r => r.status.includes('招聘中'));
  const daysBuckets = { '0-14天':0, '15-28天':0, '29-42天':0, '43-56天':0, '57天+':0 };
  recruitingList.forEach(r => {
    if (!r.startDate) return;
    const days = Math.floor((new Date() - r.startDate) / 86400000);
    if (days<=14) daysBuckets['0-14天']++; else if (days<=28) daysBuckets['15-28天']++; else if (days<=42) daysBuckets['29-42天']++; else if (days<=56) daysBuckets['43-56天']++; else daysBuckets['57天+']++;
  });
  makeChart('chart-days-dist', {
    type:'bar',
    data:{ labels:Object.keys(daysBuckets), datasets:[{ label:'岗位数', data:Object.values(daysBuckets), backgroundColor:['#0d9488','#14b8a6','#d97706','#f59e0b','#dc2626'], borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
  });
}

// ---- SECTION 9: INSIGHT ----
function renderInsight(m) {
  const el = document.getElementById('content-insight');
  
  // Auto-generate insights
  const insights = [];
  if (m.achieveRate >= 0.9) insights.push({ type:'good', text:`周期内达成率 <strong>${(m.achieveRate*100).toFixed(1)}%</strong>，已突破90%挑战线，整体招聘效率表现优秀。持续保持当前节奏。` });
  else if (m.achieveRate >= 0.8) insights.push({ type:'warn', text:`周期内达成率 <strong>${(m.achieveRate*100).toFixed(1)}%</strong>，介于底线80%与挑战90%之间，仍有提升空间。` });
  else insights.push({ type:'danger', text:`周期内达成率 <strong>${(m.achieveRate*100).toFixed(1)}%</strong>，未达底线80%，需立即排查原因并制定改进方案。` });
  
  if (m.totalOverdue > 0) insights.push({ type:'danger', text:`共 <strong>${m.totalOverdue}</strong> 个超周期入职岗位，超期率 <strong>${(m.overdueRate*100).toFixed(1)}%</strong>。超期岗位全部集中在欧洲区，以职能类（Junior/Senior Specialist）和操作类岗位为主。` });
  
  if (m.offerOverdue > 0) insights.push({ type:'danger', text:`存在 <strong>${m.offerOverdue}</strong> 个已发offer待入职超期岗位，属最紧急风险敞口，需立即跟进确认候选人状态。` });
  
  if (m.overseas.rate < m.domestic.rate) insights.push({ type:'warn', text:`海外区域达成率（${(m.overseas.rate*100).toFixed(1)}%）明显低于国内（${(m.domestic.rate*100).toFixed(1)}%），差距 ${Math.abs((m.domestic.rate-m.overseas.rate)*100).toFixed(1)}个百分点，海外岗位的招聘周期标准可能需要重新评估。` });
  
  if (m.warnings.length > 0) insights.push({ type:'warn', text:`当前有 <strong>${m.warnings.length}</strong> 个在招岗位已接近或超过标准周期80%，建议提前干预，启动备选方案或加速流程。` });
  
  const recruitersOverdue = m.recruiters.filter(r => r.overdue >= 2);
  if (recruitersOverdue.length > 0) insights.push({ type:'info', text:`招聘负责人超期集中：${recruitersOverdue.map(r=>`<strong>${r.name}(${r.overdue}人)</strong>`).join('、')}，建议逐一沟通了解超期原因，评估工作量是否合理。` });
  
  el.innerHTML = insights.map(i => `
    <div class="alert alert-${i.type==='danger'?'danger':i.type==='warn'?'warning':'info'}">
      <span class="alert-icon">${i.type==='danger'?'🔴':i.type==='warn'?'🟠':'🔵'}</span>
      <div>${i.text}</div>
    </div>
  `).join('');
}

// ---- SECTION 10: SUGGESTION ----
function renderSuggestion(m) {
  const el = document.getElementById('content-suggestion');
  
  let urgentItems = '', mediumItems = '', longItems = '';
  
  if (m.offerOverdue > 0) {
    urgentItems += `<li>紧急跟进已发offer待入职超期的 <strong>${m.offerOverdue}</strong> 个岗位，与招聘负责人及业务方确认候选人状态和延期原因</li>`;
    urgentItems += `<li>将超期offer待入职岗位列入每日跟踪清单，直至候选人完成入职</li>`;
  }
  if (m.totalOverdue > 0) {
    urgentItems += `<li>优先处理超期天数超过30天的严重超期岗位，评估是否需要调整招聘策略或启动备选</li>`;
  }
  if (!urgentItems) urgentItems = '<li>当前无紧急风险敞口，按常规节奏推进</li>';
  
  const highOverdueRecs = m.recruiters.filter(r => r.overdue >= 2);
  if (highOverdueRecs.length > 0) {
    mediumItems += `<li>与超期人数较多的招聘负责人（${highOverdueRecs.map(r=>r.name).join('、')}）逐一沟通，了解超期根本原因</li>`;
    mediumItems += `<li>评估招聘负责人的工作量分配是否合理，必要时提供资源支持或调整分工</li>`;
    mediumItems += `<li>对超期集中的部门（如IT意大利区、EU技术部、TM终端管理部），联动业务BP开展招聘效率专项复盘</li>`;
  }
  mediumItems += `<li>建立超期80%预警机制：当岗位招聘天数超过标准周期80%时自动触发提醒</li>`;
  
  longItems += `<li>建议HRBP与业务部门复盘海外职能类、操作类岗位的标准招聘周期（当前统一42-60天需差异化）</li>`;
  longItems += `<li>考虑实施分层周期管理：海外Junior岗位42天不变，Senior/Supervisor级别调整为49-60天，Architect级别60-75天</li>`;
  longItems += `<li>针对海外职能类岗位，探索本地化招聘渠道拓展策略，缩短海外岗位平均到岗周期</li>`;
  longItems += `<li>建立招聘周期看板的周度/月度自动刷新机制，实现数据驱动的常态化管控</li>`;
  
  el.innerHTML = `
    <div class="rec-grid">
      <div class="rec-card rec-urgent"><h4>🔴 短期行动（本周）</h4><ul>${urgentItems}</ul></div>
      <div class="rec-card rec-medium"><h4>🟠 中期优化（本月）</h4><ul>${mediumItems}</ul></div>
      <div class="rec-card rec-long"><h4>🔵 长期策略（季度）</h4><ul>${longItems}</ul></div>
    </div>
  `;
}

// ============================================================
// INTERACTIONS
// ============================================================
function showDetailModal(title, metric, value) {
  const data = STATE.rawData;
  let filtered;
  if (metric === '有效需求') {
    filtered = data.filter(r => ['招聘中','已发offer待入职','已入职'].some(s => r.status.includes(s)));
  } else if (metric === '已入职') {
    filtered = data.filter(r => r.status.includes('已入职') && !r.status.includes('待入职'));
  } else if (metric === '超周期') {
    filtered = data.filter(r => (r.status.includes('已入职') && !r.status.includes('待入职') && !r.isOnTime) || (r.status.includes('已发offer') && r.status.includes('待入职') && (r.cycleDiff>0||r.actualCycle>r.stdCycle)));
  } else {
    filtered = data.filter(r => r.status.includes('已入职') && !r.status.includes('待入职') && r.isOnTime);
  }
  
  let tbody = filtered.slice(0, 200).map(r => `<tr>
    <td>${r.reqNo||'-'}</td><td>${r.position||'-'}</td><td>${r.org3||r.org2||'-'}</td>
    <td>${r.recruiter||'-'}</td><td>${r.status||'-'}</td>
    <td>${r.stdCycle?'<span class="tag tag-blue">'+r.stdCycle+'天</span>':'-'}</td>
    <td>${r.actualCycle||'-'}</td>
  </tr>`).join('');
  
  const modal = document.getElementById('modal-container');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3>${title}（共 ${filtered.length} 条）</h3>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="table-wrap tall"><table><thead><tr><th>需求编号</th><th>岗位</th><th>部门</th><th>负责人</th><th>状态</th><th>标准周期</th><th>实际周期</th></tr></thead><tbody>${tbody||'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">无数据</td></tr>'}</tbody></table></div>
        </div>
      </div>
    </div>`;
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
}

function exportToExcel() {
  if (!STATE.dataLoaded) { alert('请先上传数据文件'); return; }
  const ws = XLSX.utils.json_to_sheet(STATE.rawData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '招聘数据');
  XLSX.writeFile(wb, '招聘周期达成率_导出数据.xlsx');
}

function populateFilters() {
  if (!STATE.dataLoaded) return;
  const data = STATE.rawData;
  const recruiters = [...new Set(data.map(r => r.recruiter).filter(Boolean))].sort();
  const regions = [...new Set(data.map(r => r.org3).filter(Boolean))].sort();
  const categories = [...new Set(data.map(r => r.category||r.costType).filter(Boolean))].sort();
  
  const selR = document.getElementById('filter-recruiter');
  selR.innerHTML = '<option value="all">全部负责人</option>' + recruiters.map(r => `<option value="${r}">${r}</option>`).join('');
  
  const selReg = document.getElementById('filter-region');
  selReg.innerHTML = '<option value="all">全部区域</option>' + regions.map(r => `<option value="${r}">${r}</option>`).join('');
  
  const selCat = document.getElementById('filter-category');
  selCat.innerHTML = '<option value="all">全部类别</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function applyFilters() {
  STATE.filters.period = document.getElementById('filter-period').value;
  STATE.filters.recruiter = document.getElementById('filter-recruiter').value;
  STATE.filters.region = document.getElementById('filter-region').value;
  STATE.filters.category = document.getElementById('filter-category').value;
  
  const m = computeAllMetrics(STATE.rawData);
  renderAll(m);
}

// ============================================================
// FILE UPLOAD
// ============================================================
async function handleFileUpload(file) {
  if (!file) return;
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = '正在解析...';
  statusEl.style.color = 'var(--warning)';
  
  try {
    const data = await parseUploadedExcel(file);
    STATE.rawData = data;
    STATE.dataLoaded = true;
    
    statusEl.textContent = `✅ 已加载 ${data.length} 条数据`;
    statusEl.style.color = 'var(--success)';
    
    document.getElementById('upload-overlay').classList.add('hidden');
    populateFilters();
    
    const m = computeAllMetrics(data);
    renderAll(m);
  } catch (err) {
    statusEl.textContent = '❌ 解析失败：' + err.message;
    statusEl.style.color = 'var(--danger)';
    console.error(err);
  }
}

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  buildNavigation();
  buildContentSkeleton();
  
  // Auto-load embedded data if present
  const embeddedEl = document.getElementById('embedded-data');
  if (embeddedEl && embeddedEl.textContent.trim()) {
    try {
      const raw = JSON.parse(embeddedEl.textContent.trim());
      // Convert date strings back to Date objects
      STATE.rawData = raw.map(r => ({
        ...r,
        startDate: parseDate(r.startDate),
        onboardDate: parseDate(r.onboardDate),
      }));
      STATE.dataLoaded = true;
      document.getElementById('upload-overlay').classList.add('hidden');
      document.getElementById('upload-status').textContent = '✅ 已加载 ' + STATE.rawData.length + ' 条数据（预置）';
      document.getElementById('upload-status').style.color = 'var(--success)';
      populateFilters();
      const m = computeAllMetrics(STATE.rawData);
      renderAll(m);
      console.log('预置数据已自动加载：' + STATE.rawData.length + ' 条记录');
    } catch(e) {
      console.warn('预置数据解析失败，请手动上传Excel：', e);
    }
  }
  
  // Toggle nav
  document.getElementById('toggle-nav').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });
  
  // File upload
  document.getElementById('file-input').addEventListener('change', (e) => {
    if (e.target.files[0]) handleFileUpload(e.target.files[0]);
  });
  document.getElementById('upload-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  
  // Overlay upload
  const overlayInput = document.getElementById('overlay-file-input');
  document.getElementById('upload-dropzone').addEventListener('click', () => overlayInput.click());
  overlayInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFileUpload(e.target.files[0]);
  });
  
  // Drag and drop on overlay
  const overlay = document.getElementById('upload-overlay');
  ['dragenter','dragover'].forEach(evt => {
    document.addEventListener(evt, (e) => { e.preventDefault(); overlay.classList.remove('hidden'); });
  });
  overlay.addEventListener('dragleave', (e) => { if (e.target === overlay) overlay.classList.add('hidden'); });
  overlay.addEventListener('drop', (e) => {
    e.preventDefault();
    overlay.classList.add('hidden');
    const file = e.dataTransfer.files[0];
    if (file) handleFileUpload(file);
  });
  
  // Filter changes
  ['filter-period','filter-recruiter','filter-region','filter-category'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  
  // Export
  document.getElementById('export-btn').addEventListener('click', exportToExcel);
  
  // Nav scroll spy
  document.getElementById('content').addEventListener('scroll', () => {
    const sections = document.querySelectorAll('.section');
    let current = '';
    sections.forEach(s => {
      const top = s.getBoundingClientRect().top;
      if (top < 200) current = s.id.replace('section-','');
    });
    if (current) {
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.target === current);
      });
    }
  });
}

init();
console.log('招聘周期达成率标准化看板 v2.0 已就绪 ✅');
console.log('数据已预置，也可上传新Excel文件覆盖');
</script>
